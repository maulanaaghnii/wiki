paths:
  static: 'docs'
  uploads: 'docs'
_editables:
  content:
    link: true
    blockquote: true
    bold: true
    format: "p h1 h2 h3 h4 h5 h6"
    italic: true
    strike: true
    subscript: true
    superscript: true
    underline: true
    bulletedlist: true
    indent: true
    numberedlist: true
    outdent: true
    code: true
    embed: true
    horizontalrule: true
    image: true
    table: true
    undo: true
    redo: true
    removeformat: true
    copyformatting: true
timezone: Asia/Jakarta
markdown:
  engine: commonmark
  options: {}
collections_config:
  pages:
    path: docs
    icon: wysiwyg
  blog:
    path: docs/blog
    icon: event_available
